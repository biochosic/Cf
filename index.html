<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Геометрія 8 клас — Інтерактивні Задачі</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --success-color: #10b981;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Ігровий контейнер */
        .game-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 550px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--accent-color);
        }

        .task-box {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        button {
            background: #334155;
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        button:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
        }

        /* Модальне вікно для малювання */
        .paint-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .paint-overlay.active {
            display: flex;
        }

        /* Таймер */
        .timer-container {
            position: absolute;
            top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            border: 2px solid #ef4444;
        }

        .paint-header {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            padding: 0 10px;
        }

        /* Полотно */
        canvas {
            border: 3px dashed #cbd5e1;
            border-radius: 15px;
            background: #ffffff;
            cursor: crosshair;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .paint-controls {
            margin-top: 15px;
        }

        .clear-btn {
            background: #ef4444;
            color: white;
            padding: 0.6rem 1.5rem;
        }
        .clear-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameBox">
        <h1>Геометрія 8 клас</h1>
        <div class="task-box" id="taskText">Завантаження задачі...</div>
        <div class="options-grid" id="optionsBox">
            </div>
    </div>

    <div class="paint-overlay" id="paintOverlay">
        <div class="timer-container">Залишилось: <span id="timer">20</span>с</div>
        <div class="paint-header">Правильно! Бонус: малюй будь-що 20 секунд! 🎨</div>
        <canvas id="paintCanvas"></canvas>
        <div class="paint-controls">
            <button class="clear-btn" id="clearBtn">Очистити</button>
        </div>
    </div>

    <script>
        // База задач з геометрії за 8 клас
        const tasks = [
            {
                question: "Знайдіть площу прямокутника зі сторонами 6 см і 8 см.",
                answers: ["14 см²", "48 см²", "28 см²", "24 см²"],
                correct: "48 см²"
            },
            {
                question: "Знайдіть суму кутів опуклого чотирикутника.",
                answers: ["180°", "360°", "540°", "90°"],
                correct: "360°"
            },
            {
                question: "У прямокутному трикутнику катети дорівнюють 3 см і 4 см. Знайдіть гіпотенузу (Т. Піфагора).",
                answers: ["5 см", "7 см", "25 см", "6 см"],
                correct: "5 см"
            },
            {
                question: "Чому дорівнює площа паралелограма, основа якого 10 см, а висота — 5 см?",
                answers: ["25 см²", "15 см²", "50 см²", "30 см²"],
                correct: "50 см²"
            }
        ];

        let currentTaskIndex = 0;

        // Елементи DOM
        const taskText = document.getElementById('taskText');
        const optionsBox = document.getElementById('optionsBox');
        const paintOverlay = document.getElementById('paintOverlay');
        const timerElement = document.getElementById('timer');
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');

        // Налаштування Canvas під екран
        function resizeCanvas() {
            canvas.width = window.innerWidth * 0.85;
            canvas.height = window.innerHeight * 0.6;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Відображення задачі
        function loadTask() {
            const currentTask = tasks[currentTaskIndex];
            taskText.innerText = currentTask.question;
            optionsBox.innerHTML = '';

            // Перемішуємо варіанти відповідей
            const shuffledAnswers = [...currentTask.answers].sort(() => Math.random() - 0.5);

            shuffledAnswers.forEach(answer => {
                const btn = document.createElement('button');
                btn.innerText = answer;
                btn.onclick = () => checkAnswer(answer);
                optionsBox.appendChild(btn);
            });
        }

        // Перевірка відповіді
        function checkAnswer(selected) {
            const currentTask = tasks[currentTaskIndex];
            if (selected === currentTask.correct) {
                startPaintMode();
            } else {
                alert("Неправильно ❌ Спробуй ще раз!");
            }
        }

        // Режим малювання з обмеженням часу
        function startPaintMode() {
            paintOverlay.classList.add('active');
            clearCanvas();
            
            let timeLeft = 20;
            timerElement.innerText = timeLeft;

            const countdown = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    paintOverlay.classList.remove('active');
                    // Перехід до наступної задачі
                    currentTaskIndex = (currentTaskIndex + 1) % tasks.length;
                    loadTask();
                }
            }, 1000);
        }

        // --- ЛОГІКА МАЛЮВАННЯ (Звичайне + Тачскрін) ---
        let painting = false;

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function endPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            
            // Отримуємо координати залежно від типу пристрою (мишка чи палець)
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#1e293b'; // Темний колір для малювання на білому тлі

            ctx.lineTo(clientX - rect.left, clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(clientX - rect.left, clientY - rect.top);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Слухачі подій для малювання
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', endPosition);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        clearBtn.addEventListener('click', clearCanvas);

        // Старт гри
        loadTask();
    </script>
</body>
</html>
