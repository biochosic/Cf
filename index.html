<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Геометрія 8 клас — Інтерактивні Задачі</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --success-color: #10b981;
            --text-color: #f8fafc;
            --current-font: 'Segoe UI', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--current-font);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Налаштування шрифту для всього сайту */
        .font-selector-top {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #334155;
            color: white;
            z-index: 10;
        }
        .font-selector-top select {
            background: #334155;
            color: white;
            border: none;
            padding: 5px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Ігровий контейнер */
        .game-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 550px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--accent-color);
        }

        .task-box {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        button {
            background: #334155;
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        button:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
        }

        /* Модальне вікно для малювання */
        .paint-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .paint-overlay.active {
            display: flex;
        }

        /* Таймер */
        .timer-container {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            border: 2px solid #ef4444;
        }

        .paint-header {
            color: #1e293b;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            margin-top: 40px;
        }

        /* Полотно */
        canvas {
            border: 3px dashed #cbd5e1;
            border-radius: 15px;
            background: #ffffff;
            cursor: crosshair;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        /* Панель інструментів малювання */
        .paint-tools {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            background: #f1f5f9;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid #cbd5e1;
        }

        .paint-tools label {
            color: #334155;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .paint-tools input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        .paint-tools select {
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #cbd5e1;
        }

        .clear-btn {
            background: #ef4444;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .clear-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

    <div class="font-selector-top">
        <label for="globalFont">Шрифт: </label>
        <select id="globalFont" onchange="changeFont(this.value)">
            <option value="'Segoe UI', sans-serif">Стандартний</option>
            <option value="'Courier New', monospace">Комп'ютерний (Monospace)</option>
            <option value="'Georgia', serif">Шкільний (Serif)</option>
            <option value="'Arial', sans-serif">Модерн (Arial)</option>
        </select>
    </div>

    <div class="game-container" id="gameBox">
        <h1>Геометрія 8 клас</h1>
        <div class="task-box" id="taskText">Завантаження задачі...</div>
        <div class="options-grid" id="optionsBox">
            </div>
    </div>

    <div class="paint-overlay" id="paintOverlay">
        <div class="timer-container">Час: <span id="timer">30</span>с</div>
        <div class="paint-header">Правильно! Твій малюнок надійно збережено, малюй далі! 🎨</div>
        
        <canvas id="paintCanvas"></canvas>
        
        <div class="paint-tools">
            <label>
                Колір:
                <input type="color" id="lineColor" value="#1e293b">
            </label>
            
            <label>
                Товщина:
                <select id="lineWidth">
                    <option value="2">Тонкий</option>
                    <option value="5" selected>Середній</option>
                    <option value="10">Товстий</option>
                    <option value="20">Маркер</option>
                </select>
            </label>

            <button class="clear-btn" id="clearBtn">Очистити все</button>
        </div>
    </div>

    <script>
        // ВЕЛИКИЙ ЗАПАС ЗАДАЧ (20 питань різної складності за 8 клас)
        const tasks = [
            { question: "Скільки сторін має чотирикутник?", answers: ["3 сторінки", "4 сторони", "5 сторін", "6 сторін"], correct: "4 сторони" },
            { question: "Як називається паралелограм, у якого всі кути прямі?", answers: ["Ромб", "Квадрат", "Прямокутник", "Трапеція"], correct: "Прямокутник" },
            { question: "Яка сума гострих кутів прямокутного трикутника?", answers: ["45°", "90°", "180°", "60°"], correct: "90°" },
            { question: "Знайдіть площу прямокутника зі сторонами 6 см і 8 см.", answers: ["14 см²", "48 см²", "28 см²", "24 см²"], correct: "48 см²" },
            { question: "Периметр квадрата 20 см. Яка довжина його однієї сторони?", answers: ["4 см", "5 см", "10 см", "20 см"], correct: "5 см" },
            { question: "Знайдіть суму кутів опуклого чотирикутника.", answers: ["180°", "360°", "540°", "90°"], correct: "360°" },
            { question: "У прямокутному трикутнику катети дорівнюють 3 см і 4 см. Знайдіть гіпотенузу.", answers: ["5 см", "7 см", "25 см", "6 см"], correct: "5 см" },
            { question: "Як називається чотирикутник, у якого тільки дві сторони паралельні?", answers: ["Ромб", "Паралелограм", "Трапеція", "Прямокутник"], correct: "Трапеція" },
            { question: "Як називається паралелограм, у якого всі сторони рівні?", answers: ["Трапеція", "Ромб", "Прямокутник", "Дельтоїд"], correct: "Ромб" },
            { question: "Чому дорівнює середня лінія трикутника, якщо паралельна їй основа рівна 12 см?", answers: ["6 см", "24 см", "12 см", "9 см"], correct: "6 см" },
            { question: "Якщо один з кутів паралелограма дорівнює 40°, то чому дорівнює сусідній кут?", answers: ["40°", "140°", "50°", "90°"], correct: "140°" },
            { question: "Діагоналі якої фігури завжди перпендикулярні та ділять його кути навпіл?", answers: ["Прямокутник", "Трапеція", "Ромб", "Довільний чотирикутник"], correct: "Ромб" },
            { question: "За якою формулою обчислюється площа квадрата зі стороною 'а'?", answers: ["S = 2a", "S = a²", "S = 4a", "S = a³"], correct: "S = a²" },
            { question: "Як називається сторона прямокутного трикутника, яка лежить навпроти прямого кута?", answers: ["Катет", "Гіпотенуза", "Основа", "Бічна сторона"], correct: "Гіпотенуза" },
            { question: "Чому дорівнює середня лінія трапеції, якщо її основи 4 см і 8 см?", answers: ["12 см", "4 см", "6 см", "3 см"], correct: "6 см" },
            { question: "Чому дорівнює площа прямокутного трикутника з катетами 4 см і 5 см?", answers: ["20 см²", "10 см²", "9 см²", "40 см²"], correct: "10 см²" },
            { question: "Скільки гострих кутів може бути у прямокутній трапеції?", answers: ["Один", "Два", "Три", "Жодного"], correct: "Один" },
            { question: "У рівнобічній трапеції кути при основі завжди...", answers: ["Рівні", "Різні", "Прямі", "Сума дорівнює 90°"], correct: "Рівні" },
            { question: "Якщо діагоналі прямокутника рівні, то що можна сказати про діагоналі квадрата?", answers: ["Вони теж рівні", "Вони різні", "Вони не перетинаються", "Вони паралельні"], correct: "Вони теж рівні" },
            { question: "Чому дорівнює синус кута 30 градусів у прямокутному трикутнику?", answers: ["1", "0.5 (1/2)", "√3/2", "0"], correct: "0.5 (1/2)" }
        ];

        let currentTaskIndex = 0;

        const taskText = document.getElementById('taskText');
        const optionsBox = document.getElementById('optionsBox');
        const paintOverlay = document.getElementById('paintOverlay');
        const timerElement = document.getElementById('timer');
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const lineColorInput = document.getElementById('lineColor');
        const lineWidthInput = document.getElementById('lineWidth');

        // Розумна функція зміни розміру полотна без втрати графіки
        function resizeCanvas() {
            // Тимчасово зберігаємо малюнок перед ресайзом
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, 0, 0);

            // Надаємо нові розміри
            canvas.width = window.innerWidth * 0.9;
            canvas.height = window.innerHeight * 0.6;

            // Заливаємо білим тлом (про всяк випадок) і повертаємо малюнок
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tempCanvas, 0, 0);
        }
        
        window.addEventListener('resize', resizeCanvas);

        // Налаштування початкових розмірів полотна
        canvas.width = window.innerWidth * 0.9;
        canvas.height = window.innerHeight * 0.6;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Завантажуємо малюнок з localStorage, якщо учень вже малював раніше
        if (localStorage.getItem('savedDrawing')) {
            const img = new Image();
            img.src = localStorage.getItem('savedDrawing');
            img.onload = function() {
                ctx.drawImage(img, 0, 0);
            }
        }

        function changeFont(fontFamily) {
            document.documentElement.style.setProperty('--current-font', fontFamily);
        }

        function loadTask() {
            const currentTask = tasks[currentTaskIndex];
            taskText.innerText = currentTask.question;
            optionsBox.innerHTML = '';

            const shuffledAnswers = [...currentTask.answers].sort(() => Math.random() - 0.5);

            shuffledAnswers.forEach(answer => {
                const btn = document.createElement('button');
                btn.innerText = answer;
                btn.onclick = () => checkAnswer(answer);
                optionsBox.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            const currentTask = tasks[currentTaskIndex];
            if (selected === currentTask.correct) {
                startPaintMode();
            } else {
                alert("Неправильно ❌ Спробуй ще раз!");
            }
        }

        function startPaintMode() {
            paintOverlay.classList.add('active');
            
            let timeLeft = 30;
            timerElement.innerText = timeLeft;

            const countdown = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    
                    // ЗБЕРЕЖЕННЯ ПРОГРЕСУ В ЛОКАЛЬНУ ПАМ'ЯТЬ БРАУЗЕРА
                    localStorage.setItem('savedDrawing', canvas.toDataURL());
                    
                    paintOverlay.classList.remove('active');
                    currentTaskIndex = (currentTaskIndex + 1) % tasks.length;
                    loadTask();
                }
            }, 1000);
        }

        // --- ЛОГІКА МАЛЮВАННЯ (З автозбереженням штрихів) ---
        let painting = false;

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function endPosition() {
            painting = false;
            ctx.beginPath();
            // Зберігаємо стан після кожного відпускання олівця/пальця
            localStorage.setItem('savedDrawing', canvas.toDataURL());
        }

        function draw(e) {
            if (!painting) return;
            
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            ctx.lineWidth = lineWidthInput.value;
            ctx.strokeStyle = lineColorInput.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.lineTo(clientX - rect.left, clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(clientX - rect.left, clientY - rect.top);
        }

        function clearCanvas() {
            if(confirm("Ти впевнений, що хочеш повністю стерти малюнок?")) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                localStorage.removeItem('savedDrawing'); // Видаляємо з пам'яті браузера
            }
        }

        // Події миші
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);

        // Події тачскріна
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', endPosition);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        clearBtn.addEventListener('click', clearCanvas);

        loadTask();
    </script>
</body>
</html>
